<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄花秘典 | 风水花卉智能推荐</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* 主色调 - 深邃宇宙 */
            --bg-primary: #0a0a1a;
            --bg-secondary: #121228;
            --bg-card: rgba(20, 25, 50, 0.7);
            --bg-card-hover: rgba(30, 35, 65, 0.8);
            
            /* 光晕色系 */
            --glow-gold: #f0c674;
            --glow-purple: #b294bb;
            --glow-cyan: #8abeb7;
            --glow-pink: #cc6666;
            --glow-blue: #81a2be;
            
            /* 渐变色 */
            --gradient-primary: linear-gradient(135deg, #f0c674 0%, #b294bb 50%, #81a2be 100%);
            --gradient-gold: linear-gradient(135deg, #d4a84b 0%, #f0c674 50%, #ffd700 100%);
            --gradient-purple: linear-gradient(135deg, #9d7cb8 0%, #b294bb 50%, #c9a0dc 100%);
            
            /* 文字 */
            --text-primary: #e8e8f0;
            --text-secondary: #8a8aa8;
            --text-muted: #5a5a78;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 神秘星空背景 */
        .cosmos-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(157, 78, 221, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 198, 116, 0.04) 0%, transparent 60%),
                var(--bg-primary);
            z-index: -2;
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(240, 198, 116, 0.4);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
            box-shadow: 0 0 8px rgba(240, 198, 116, 0.6);
        }

        .particle:nth-child(2) { left: 15%; animation-delay: -3s; background: rgba(178, 148, 187, 0.4); box-shadow: 0 0 8px rgba(178, 148, 187, 0.6); }
        .particle:nth-child(3) { left: 35%; animation-delay: -6s; background: rgba(138, 190, 183, 0.4); box-shadow: 0 0 8px rgba(138, 190, 183, 0.6); }
        .particle:nth-child(4) { left: 55%; animation-delay: -9s; background: rgba(204, 102, 102, 0.4); box-shadow: 0 0 8px rgba(204, 102, 102, 0.6); }
        .particle:nth-child(5) { left: 75%; animation-delay: -12s; }
        .particle:nth-child(6) { left: 10%; animation-delay: -15s; background: rgba(138, 190, 183, 0.4); }
        .particle:nth-child(7) { left: 65%; animation-delay: -18s; background: rgba(178, 148, 187, 0.4); }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) scale(1); }
            90% { opacity: 1; transform: translateY(10vh) scale(1); }
            100% { opacity: 0; transform: translateY(0) scale(0); }
        }

        /* 装饰花朵 */
        .flower-decor {
            position: fixed;
            z-index: -1;
            opacity: 0.02;
            animation: sway 10s infinite ease-in-out;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg) translateX(0); }
            50% { transform: rotate(3deg) translateX(5px); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .logo-icon {
            width: 80px; height: 80px;
            margin: 0 auto 20px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 30px rgba(240, 198, 116, 0.3),
                inset 0 0 20px rgba(255,255,255,0.1);
            animation: logoPulse 4s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(240, 198, 116, 0.3), inset 0 0 20px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 50px rgba(178, 148, 187, 0.4), inset 0 0 30px rgba(255,255,255,0.15); }
        }

        .logo-icon svg {
            width: 45px; height: 45px;
            fill: rgba(255,255,255,0.95);
        }

        .title-main {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3.5em;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(240, 198, 116, 0.3));
            margin-bottom: 8px;
        }

        .title-sub {
            font-size: 1em;
            color: var(--text-secondary);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .title-divider {
            width: 120px;
            height: 2px;
            background: var(--gradient-primary);
            margin: 25px auto;
            border-radius: 1px;
        }

        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(240, 198, 116, 0.1);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: var(--gradient-primary);
            opacity: 0.5;
        }

        .card:hover {
            border-color: rgba(240, 198, 116, 0.2);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(240, 198, 116, 0.1);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 1.1em;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .section-icon {
            width: 32px; height: 32px;
            background: rgba(240, 198, 116, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(240, 198, 116, 0.2);
        }

        .section-icon svg {
            width: 18px; height: 18px;
            fill: var(--glow-gold);
        }

        /* 方位网格 */
        .direction-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .direction-btn {
            padding: 18px 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(138, 190, 183, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .direction-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .direction-btn:hover {
            border-color: rgba(138, 190, 183, 0.4);
            background: rgba(138, 190, 183, 0.08);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .direction-btn.active {
            border-color: var(--glow-cyan);
            background: rgba(138, 190, 183, 0.15);
            box-shadow: 
                0 0 20px rgba(138, 190, 183, 0.3),
                inset 0 0 20px rgba(138, 190, 183, 0.1);
        }

        .direction-btn.active::before {
            opacity: 0.1;
        }

        .direction-icon {
            width: 36px; height: 36px;
            margin: 0 auto 8px;
            display: block;
        }

        .direction-icon svg {
            width: 100%; height: 100%;
            fill: var(--glow-cyan);
            opacity: 0.8;
            transition: all 0.3s;
        }

        .direction-btn:hover .direction-icon svg,
        .direction-btn.active .direction-icon svg {
            fill: var(--glow-gold);
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(240, 198, 116, 0.5));
        }

        .direction-btn .dir-name {
            font-size: 1.2em;
            font-weight: 600;
            display: block;
            margin-bottom: 3px;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
        }

        .direction-btn .element {
            font-size: 0.7em;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
        }

        /* 房间网格 */
        .room-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .room-btn {
            padding: 16px 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(178, 148, 187, 0.15);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .room-btn:hover {
            border-color: rgba(178, 148, 187, 0.4);
            background: rgba(178, 148, 187, 0.08);
            transform: translateY(-2px);
        }

        .room-btn.active {
            border-color: var(--glow-purple);
            background: rgba(178, 148, 187, 0.15);
            box-shadow: 0 0 20px rgba(178, 148, 187, 0.2);
        }

        .room-icon {
            width: 28px; height: 28px;
        }

        .room-icon svg {
            width: 100%; height: 100%;
            fill: var(--glow-purple);
            opacity: 0.7;
            transition: all 0.3s;
        }

        .room-btn:hover .room-icon svg,
        .room-btn.active .room-icon svg {
            fill: var(--glow-gold);
            opacity: 1;
            filter: drop-shadow(0 0 6px rgba(240, 198, 116, 0.4));
        }

        .room-name {
            font-size: 0.9em;
            color: var(--text-primary);
        }

        /* 生肖网格 */
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .zodiac-btn {
            padding: 14px 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(240, 198, 116, 0.15);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .zodiac-btn:hover {
            border-color: rgba(240, 198, 116, 0.4);
            background: rgba(240, 198, 116, 0.08);
            transform: translateY(-2px) scale(1.02);
        }

        .zodiac-btn.active {
            border-color: var(--glow-gold);
            background: rgba(240, 198, 116, 0.15);
            box-shadow: 0 0 20px rgba(240, 198, 116, 0.25);
        }

        .zodiac-icon {
            width: 32px; height: 32px;
        }

        .zodiac-icon svg {
            width: 100%; height: 100%;
            fill: var(--glow-gold);
            opacity: 0.8;
            transition: all 0.3s;
        }

        .zodiac-btn:hover .zodiac-icon svg,
        .zodiac-btn.active .zodiac-icon svg {
            fill: var(--glow-gold);
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(240, 198, 116, 0.5));
            transform: scale(1.1);
        }

        .zodiac-name {
            font-size: 0.85em;
            font-weight: 500;
            color: var(--text-primary);
        }

        .zodiac-element {
            font-size: 0.65em;
            color: var(--text-secondary);
        }

        /* 诉求网格 */
        .wish-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .wish-btn {
            padding: 18px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(204, 102, 102, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .wish-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(204, 102, 102, 0.1), transparent);
            transition: left 0.5s;
        }

        .wish-btn:hover::before {
            left: 100%;
        }

        .wish-btn:hover {
            border-color: rgba(204, 102, 102, 0.4);
            background: rgba(204, 102, 102, 0.08);
            transform: translateY(-2px);
        }

        .wish-btn.active {
            border-color: var(--glow-pink);
            background: rgba(204, 102, 102, 0.15);
            box-shadow: 0 0 25px rgba(204, 102, 102, 0.2);
        }

        .wish-icon-wrap {
            width: 44px; height: 44px;
            background: rgba(204, 102, 102, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(204, 102, 102, 0.2);
            flex-shrink: 0;
        }

        .wish-icon {
            width: 24px; height: 24px;
        }

        .wish-icon svg {
            width: 100%; height: 100%;
            fill: var(--glow-pink);
            opacity: 0.8;
            transition: all 0.3s;
        }

        .wish-btn:hover .wish-icon svg,
        .wish-btn.active .wish-icon svg {
            fill: var(--glow-gold);
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(240, 198, 116, 0.4));
        }

        .wish-btn.active .wish-icon-wrap {
            background: rgba(240, 198, 116, 0.15);
            border-color: rgba(240, 198, 116, 0.3);
        }

        .wish-text {
            flex: 1;
        }

        .wish-name {
            font-weight: 600;
            font-size: 1em;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .wish-desc {
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        /* 提交按钮 */
        .submit-section {
            margin-top: 30px;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 16px;
            font-size: 1.2em;
            font-weight: 600;
            color: rgba(10, 10, 26, 0.9);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 2px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(240, 198, 116, 0.3),
                0 0 60px rgba(240, 198, 116, 0.2);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show { display: block; }

        .loading-spinner {
            width: 60px; height: 60px;
            margin: 0 auto 20px;
            position: relative;
        }

        .loading-spinner::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 3px solid rgba(240, 198, 116, 0.2);
            border-top-color: var(--glow-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        /* 结果区域 */
        .result-section {
            display: none;
            animation: fadeIn 0.6s ease;
        }

        .result-section.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, rgba(240, 198, 116, 0.1), rgba(178, 148, 187, 0.1));
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(240, 198, 116, 0.2);
        }

        .result-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8em;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .result-tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(240, 198, 116, 0.2);
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .result-tag.highlight {
            background: rgba(240, 198, 116, 0.1);
            border-color: rgba(240, 198, 116, 0.4);
            color: var(--glow-gold);
        }

        /* 推荐卡片 */
        .recommendation-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(240, 198, 116, 0.15);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .recommendation-card:hover {
            border-color: rgba(240, 198, 116, 0.3);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .flower-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .flower-name {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flower-icon {
            width: 32px; height: 32px;
        }

        .flower-icon svg {
            width: 100%; height: 100%;
            fill: var(--glow-gold);
        }

        .matched-wish {
            padding: 4px 12px;
            background: rgba(204, 102, 102, 0.15);
            border: 1px solid rgba(204, 102, 102, 0.3);
            border-radius: 12px;
            font-size: 0.75em;
            color: var(--glow-pink);
        }

        .flower-reason {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .flower-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detail-tag {
            padding: 5px 12px;
            background: rgba(138, 190, 183, 0.1);
            border: 1px solid rgba(138, 190, 183, 0.2);
            border-radius: 8px;
            font-size: 0.8em;
            color: var(--glow-cyan);
        }

        /* 错误提示 */
        .error-msg {
            display: none;
            padding: 15px 20px;
            background: rgba(204, 102, 102, 0.1);
            border: 1px solid rgba(204, 102, 102, 0.3);
            border-radius: 12px;
            color: var(--glow-pink);
            margin-bottom: 20px;
            text-align: center;
        }

        .error-msg.show { display: block; }

        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            .title-main { font-size: 2.5em; }
            .card { padding: 20px; }
            .direction-grid, .room-grid, .zodiac-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .wish-grid { grid-template-columns: 1fr; }
            .direction-btn { padding: 14px 6px; }
            .direction-icon { width: 28px; height: 28px; }
            .direction-btn .dir-name { font-size: 1em; }
            .zodiac-icon { width: 26px; height: 26px; }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="cosmos-bg"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <h1 class="title-main">玄花秘典</h1>
            <p class="title-sub">风水花卉智能推荐</p>
            <div class="title-divider"></div>
        </header>

        <div id="errorMsg" class="error-msg"></div>

        <!-- 选择区域 -->
        <div id="selectionArea" class="card card-glow">
            <div class="section-title">
                <div class="section-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                选择房屋朝向
            </div>
            <div class="direction-grid" id="directionGrid"></div>
        </div>

        <div class="card card-glow">
            <div class="section-title">
                <div class="section-icon">

    <script>
        let selectedDirection = '';
        let selectedRoom = '';
        let selectedZodiac = '';
        let selectedWishes = [];

        const directions = [
            { value: '东', element: '木', colors: '青绿', icon: 'east' },
            { value: '东南', element: '木', colors: '青绿', icon: 'southeast' },
            { value: '南', element: '火', colors: '红紫', icon: 'south' },
            { value: '西南', element: '土', colors: '黄棕', icon: 'southwest' },
            { value: '西', element: '金', colors: '白金', icon: 'west' },
            { value: '西北', element: '金', colors: '白金', icon: 'northwest' },
            { value: '北', element: '水', colors: '黑蓝', icon: 'north' },
            { value: '东北', element: '土', colors: '黄棕', icon: 'northeast' },
            { value: '中', element: '土', colors: '黄棕', icon: 'center' }
        ];

        const rooms = [
            { value: '客厅', icon: 'living' },
            { value: '卧室', icon: 'bedroom' },
            { value: '书房', icon: 'study' },
            { value: '厨房', icon: 'kitchen' },
            { value: '卫生间', icon: 'bathroom' },
            { value: '阳台', icon: 'balcony' },
            { value: '玄关', icon: 'entrance' },
            { value: '餐厅', icon: 'dining' }
        ];

        function init() {
            renderDirections();
            renderRooms();
        }

        function renderDirections() {
            const grid = document.getElementById('directionGrid');
            grid.innerHTML = directions.map(d => `
                <div class="direction-btn" data-value="${d.value}" onclick="selectDirection('${d.value}')">
                    <div class="direction-icon">
                        <svg viewBox="0 0 24 24"><path d="${getDirectionPath(d.value)}"/></svg>
                    </div>
                    <span class="dir-name">${d.value}</span>
                    <span class="element">${d.element} · ${d.colors}</span>
                </div>
            `).join('');
        }

        function getDirectionPath(dir) {
            const paths = {
                '东': 'M12 2l-7 7h4v6h6V9h4L12 2z',
                '东南': 'M12 2L2 12h4v8h12v-8h4L12 2z',
                '南': 'M12 22l7-7h-4V9H9v6H5l7 7z',
                '西南': 'M22 12l-7-7v4H9v6h6v4l7-7z',
                '西': 'M2 12l7 7v-4h6V9H9V5l-7 7z',
                '西北': 'M12 22l7-7h-4V9H5v6h4l-7 7z',
                '北': 'M12 2l-7 7h4v6h6V9h4L12 2z',
                '东北': 'M2 12l7-7v4h6v6H9v4l-7-7z',
                '中': 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z'
            };
            return paths[dir] || paths['中'];
        }

        function renderRooms() {
            const grid = document.getElementById('roomGrid');
            grid.innerHTML = rooms.map(r => `
                <div class="room-btn" data-value="${r.value}" onclick="selectRoom('${r.value}')">
                    <div class="room-icon">
                        <svg viewBox="0 0 24 24"><path d="${getRoomPath(r.value)}"/></svg>
                    </div>
                    <span class="room-name">${r.value}</span>
                </div>
            `).join('');
        }

        function getRoomPath(room) {
            const paths = {
                '客厅': 'M21 8V7l-3-3H6L3 7v1H1v13h6v-2h10v2h6V8h-2zM7 13H5v-2h2v2zm0-4H5V7h2v2z',
                '卧室': 'M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z',
                '书房': 'M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z',
                '厨房': 'M18 2.01L6 2c-1.1 0-2 .89-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.11-.9-1.99-2-1.99zM18 20H6v-9.02h12V20zm0-11H6V4h12v5zM8 5h2v3H8zm0 7h2v5H8z',
                '卫生间': 'M7 2v11h3v9l7-12h-4l4-8z',
                '阳台': 'M3 21h18v-2H3v2zm6-4h12v-2H9v2zm-6-4h18v-2H3v2zm6-4h12V7H9v2zM3 3v2h18V3H3z',
                '玄关': 'M19 19V5c0-1.1-.9-2-2-2H7c-1.1 0-2 .9-2 2v14H3v2h18v-2h-2zm-2 0H7V5h10v14z',
                '餐厅': 'M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z'
            };
            return paths[room] || paths['客厅'];
        }

        function selectDirection(value) {
            selectedDirection = value;
            document.querySelectorAll('.direction-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.value === value);
            });
            checkCanSubmit();
        }

        function selectRoom(value) {
            selectedRoom = value;
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.value === value);
            });
            checkCanSubmit();
        }

        function selectZodiac(value) {
            selectedZodiac = selectedZodiac === value ? '' : value;
            document.querySelectorAll('.zodiac-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.value === selectedZodiac);
            });
        }

        function selectWish(value) {
            if (selectedWishes.includes(value)) {
                selectedWishes = selectedWishes.filter(w => w !== value);
            } else if (selectedWishes.length < 2) {
                selectedWishes.push(value);
            }
            document.querySelectorAll('.wish-btn').forEach(btn => {
                btn.classList.toggle('active', selectedWishes.includes(btn.dataset.value));
            });
        }

        function checkCanSubmit() {
            document.getElementById('submitBtn').disabled = !(selectedDirection && selectedRoom);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('submitBtn').disabled = show;
        }

        async function getRecommendation() {
            if (!selectedDirection || !selectedRoom) {
                showError('请先选择房屋朝向和房间类型');
                return;
            }

            showLoading(true);
            document.getElementById('resultSection').classList.remove('show');

            try {
                const res = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        direction: selectedDirection,
                        room: selectedRoom,
                        zodiac: selectedZodiac || null,
                        wishes: selectedWishes
                    })
                });

                const data = await res.json();

                if (!data.success) {
                    showError(data.error);
                    return;
                }

                renderResult(data.data);
            } catch (err) {
                showError('请求失败，请检查网络后重试');
            } finally {
                showLoading(false);
            }
        }

        function renderResult(result) {
            document.getElementById('resultZodiac').textContent = result.zodiac ? `${result.zodiac}年` : '';
            document.getElementById('resultZodiac').style.display = result.zodiac ? 'inline-block' : 'none';
            document.getElementById('resultDirection').textContent = `${result.direction}方`;
            document.getElementById('resultRoom').textContent = result.room;
            document.getElementById('resultElement').textContent = `${result.element}行`;

            const wishesEl = document.getElementById('resultWishes');
            if (result.wishes && result.wishes.length > 0) {
                wishesEl.innerHTML = result.wishes.map(w => `<span class="result-tag highlight">${w}</span>`).join('');
                wishesEl.style.display = 'flex';
            } else {
                wishesEl.style.display = 'none';
            }

            document.getElementById('recommendations').innerHTML = result.recommendations.map(rec => {
                const wishBadge = rec.matched_wishes && rec.matched_wishes.length > 0
                    ? `<span class="matched-wish">${rec.matched_wishes.join('+')}</span>`
                    : '';

                return `
                <div class="recommendation-card">
                    <div class="flower-header">
                        <span class="flower-name">
                            <span class="flower-icon"><svg viewBox="0 0 24 24"><path d="M12 22c4.97 0 9-4.03 9-9-4.5 0-9 4.5-9 9zm0-20C7.03 2 3 6.03 3 11c4.5 0 9-4.5 9-9z"/></svg></span>
                            ${rec.flower}
                        </span>
                        ${wishBadge}
                    </div>
                    <div class="flower-reason">${rec.reason}</div>
                    <div class="flower-details">
                        <span class="detail-tag">${rec.color}色</span>
                        <span class="detail-tag">${rec.element}行</span>
                        <span class="detail-tag">${rec.direction}方</span>
                        ${rec.is_auspicious ? '<span class="detail-tag">✨ 大吉</span>' : ''}
                    </div>
                </div>
                `;
            }).join('');

            document.getElementById('resultSection').classList.add('show');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        init();
    </script>
</body>
</html>
